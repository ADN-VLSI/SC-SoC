<svg width="680" height="740" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th  { font-size: 14px; font-weight: 600; }
      .ts  { font-size: 12px; font-weight: 400; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="740" fill="#ffffff"/>

  <!-- ── IDLE ── -->
  <ellipse cx="340" cy="52" rx="120" ry="32" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
  <text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central">IDLE</text>
  <text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">tx_o=1   data_ready_o=1</text>

  <!-- ── START ── -->
  <rect x="220" y="140" width="240" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text class="th" x="340" y="162" text-anchor="middle" dominant-baseline="central" fill="#3C3489">START</text>
  <text class="ts" x="340" y="180" text-anchor="middle" dominant-baseline="central" fill="#534AB7">tx_o = 0   (1 baud period)</text>

  <!-- ── DATA ── -->
  <rect x="220" y="260" width="240" height="76" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text class="th" x="340" y="282" text-anchor="middle" dominant-baseline="central" fill="#0C447C">DATA</text>
  <text class="ts" x="340" y="300" text-anchor="middle" dominant-baseline="central" fill="#185FA5">tx_o = data_i[bit_cnt]</text>
  <text class="ts" x="340" y="316" text-anchor="middle" dominant-baseline="central" fill="#185FA5">count 5-8 bits per data_bits_i</text>

  <!-- ── PARITY ── -->
  <rect x="220" y="396" width="240" height="76" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text class="th" x="340" y="416" text-anchor="middle" dominant-baseline="central" fill="#712B13">PARITY</text>
  <text class="ts" x="340" y="434" text-anchor="middle" dominant-baseline="central" fill="#993C1D">parity_type=0: tx_o = ^data (even)</text>
  <text class="ts" x="340" y="450" text-anchor="middle" dominant-baseline="central" fill="#993C1D">parity_type=1: tx_o = ~(^data) (odd)</text>

  <!-- ── STOP ── -->
  <rect x="220" y="530" width="240" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text class="th" x="340" y="552" text-anchor="middle" dominant-baseline="central" fill="#085041">STOP</text>
  <text class="ts" x="340" y="570" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">tx_o = 1   (1st stop bit)</text>

  <!-- ── STOP2 ── -->
  <rect x="220" y="650" width="240" height="60" rx="8" fill="#E1F5EEA0" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 3"/>
  <text class="th" x="340" y="672" text-anchor="middle" dominant-baseline="central" fill="#085041">STOP2</text>
  <text class="ts" x="340" y="690" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">tx_o = 1   (2nd stop bit)</text>

  <!-- ── TRANSITIONS ── -->

  <!-- IDLE self loop: !data_valid_i -->
  <path d="M460 36 Q530 8 468 44" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="490" y="12" text-anchor="start" fill="#5F5E5A">!data_valid_i</text>

  <!-- IDLE → START -->
  <line x1="340" y1="84" x2="340" y2="138" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="112" text-anchor="start" fill="#534AB7">data_valid_i = 1</text>

  <!-- START → DATA -->
  <line x1="340" y1="200" x2="340" y2="258" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="230" text-anchor="start" fill="#185FA5">next clk</text>

  <!-- DATA self loop: bit_cnt < limit -->
  <path d="M460 290 L520 290 L520 320 L462 320" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="526" y="306" text-anchor="start" fill="#185FA5">bit_cnt &lt; (4+data_bits_i)</text>

  <!-- DATA → PARITY right -->
  <path d="M460 336 L544 336 L544 434 L462 434" fill="none" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="550" y="366" text-anchor="start" fill="#993C1D">bit_cnt=(4+data_bits_i)</text>
  <text class="ts" x="550" y="380" text-anchor="start" fill="#993C1D">&amp; parity_en_i=1</text>

  <!-- DATA → STOP left (skip parity) -->
  <path d="M220 336 L148 336 L148 560 L218 560" fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="40" y="420" text-anchor="start" fill="#185FA5">bit_cnt=</text>
  <text class="ts" x="40" y="434" text-anchor="start" fill="#185FA5">(4+data_bits_i)</text>
  <text class="ts" x="40" y="448" text-anchor="start" fill="#185FA5">&amp; parity_en_i=0</text>

  <!-- PARITY → STOP -->
  <line x1="340" y1="472" x2="340" y2="528" fill="none" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="348" y="500" text-anchor="start" fill="#993C1D">next clk</text>

  <!-- STOP → STOP2 right -->
  <path d="M460 560 L510 560 L510 680 L462 680" fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="516" y="622" text-anchor="start" fill="#0F6E56">extra_stop_i=1</text>

  <!-- STOP → IDLE left -->
  <path d="M220 560 L108 560 L108 52 L218 52" fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="36" y="576" text-anchor="start" fill="#0F6E56">extra_stop_i=0</text>

  <!-- STOP2 → IDLE far right -->
  <path d="M460 680 L582 680 L582 52 L462 52" fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text class="ts" x="588" y="366" text-anchor="start" fill="#0F6E56">next clk</text>

</svg>
